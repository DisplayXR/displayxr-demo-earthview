name: Build macOS

# macOS .pkg build for the EarthView demo. Mirrors displayxr-demo-gaussiansplat's
# build-macos.yml. The demo's release cadence is manual — devs build locally and
# push a v* tag when ready; on a v* tag this workflow produces
# `DisplayXREarthView-<version>.pkg`, attaches it to the GitHub Release, and
# dispatches a versions.json bump (earthview_demo) to displayxr-runtime.
#
# EarthView is macOS-only at M1 (Windows = M2, Android = M3), so unlike
# gaussiansplat the version-bump dispatch lives HERE, in the macOS workflow,
# rather than in build-windows.yml.
#
# PR + push-to-main runs are validation only: they build the app + .pkg and
# assert its payload. The release-attach + dispatch steps stay gated on a v*
# ref. The DetectChanges/docs_only gating lets this be a required check that
# reports success in ~30s on doc-only PRs.

on:
  pull_request: {}
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          # First push to a new repo/branch: before is all-zeros (no parent) →
          # there's nothing to diff, so build (not docs-only).
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || \
             ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  BuildInstaller:
    name: Build macOS
    needs: DetectChanges
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      # Pin cesium's ezvcpkg dependency tree to a fixed path so it is
      # deterministically cacheable. (No MAX_PATH concern on macOS.)
      EZVCPKG_BASEDIR: /Users/runner/.ezvcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "docs_only=true; build steps will skip and report success."

      # cesium-native is consumed via add_subdirectory(third_party/cesium-native)
      # and bootstraps its own deps through ezvcpkg on first configure.
      - name: Clone cesium-native (v0.61.0)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          git clone --branch v0.61.0 --depth 1 --recurse-submodules \
            https://github.com/CesiumGS/cesium-native.git third_party/cesium-native

      - name: Install dependencies
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          brew install cmake ninja glslang vulkan-headers vulkan-loader molten-vk
          BREW_PREFIX=$(brew --prefix)
          echo "VULKAN_SDK=$BREW_PREFIX" >> "$GITHUB_ENV"

      - name: Derive installer version
        if: needs.DetectChanges.outputs.docs_only != 'true'
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building installer with VERSION=$VERSION"

      # Restore cesium-native's ezvcpkg dependency tree from the pinned
      # EZVCPKG_BASEDIR. Keyed on the cesium tag + the pinned vcpkg commit —
      # bump the suffix if either changes. Cache miss/outage is non-fatal
      # (actions/cache only warns), so this can never break the build.
      - name: Cache cesium vcpkg dependencies (ezvcpkg)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: /Users/runner/.ezvcpkg
          key: ezvcpkg-${{ runner.os }}-cesium-v0.61.0-vcpkg-afc0a2e0

      - name: Build demo + installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          DISPLAYXR_VERSION: ${{ steps.version.outputs.version }}
          # Explicitly DISABLE the compiler-launcher cache (empty value). cesium
          # auto-wires sccache if found on PATH, and an sccache backed by the
          # intermittently-unavailable GitHub Actions cache can hard-fail the
          # compile; build_macos.sh forwards this empty value so cesium's
          # auto-detect guard skips it.
          CMAKE_CXX_COMPILER_LAUNCHER: ""
        run: ./scripts/build_macos.sh --installer

      - name: Assert .pkg payload (regression guard)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PKG=$(find _package -maxdepth 1 -name "DisplayXREarthView-*.pkg" -type f | head -1)
          if [ -z "$PKG" ] || [ ! -f "$PKG" ]; then
            echo "::error::DisplayXREarthView-*.pkg missing from _package/"
            ls -la _package/ || true
            exit 1
          fi
          echo "Found installer: $PKG"
          EXPAND_DIR=$(mktemp -d)
          pkgutil --expand "$PKG" "$EXPAND_DIR/expand"
          PAYLOAD="$EXPAND_DIR/expand/earthview.pkg/Payload"
          if [ ! -f "$PAYLOAD" ]; then
            echo "::error::earthview.pkg/Payload not found inside .pkg"
            ls -la "$EXPAND_DIR/expand/" || true
            exit 1
          fi
          gunzip -c "$PAYLOAD" | cpio -i -t > "$EXPAND_DIR/files" 2>/dev/null

          MISSING=0
          assert_present() {
            local pattern="$1"; local what="$2"
            if ! grep -q "$pattern" "$EXPAND_DIR/files"; then
              echo "::error::$what missing from .pkg payload (pattern: $pattern)"
              MISSING=1
            fi
          }
          assert_present 'Applications/EarthView\.app/Contents/MacOS/EarthView' "launcher"
          assert_present 'Applications/EarthView\.app/Contents/Resources/earthview_handle_vk_macos' "demo binary"
          assert_present 'Applications/EarthView\.app/Contents/Resources/lib/libMoltenVK' "MoltenVK"
          assert_present 'Applications/EarthView\.app/Contents/Resources/lib/libvulkan' "Vulkan loader"
          assert_present 'Applications/EarthView\.app/Contents/Resources/lib/libopenxr_loader' "OpenXR loader"
          if [ "$MISSING" -ne 0 ]; then
            echo "Payload listing:"; cat "$EXPAND_DIR/files"; exit 1
          fi
          echo "PASS: .pkg payload contains app + dylibs."

      - name: Upload installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: DisplayXREarthView-macOS
          if-no-files-found: error
          path: _package/DisplayXREarthView-*.pkg

      - name: Attach .pkg to GitHub release on tag
        if: needs.DetectChanges.outputs.docs_only != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: _package/DisplayXREarthView-*.pkg
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  # Auto-bump versions.json[earthview_demo] on displayxr-runtime on a v* tag,
  # via the displayxr-publish-bot app (org secrets). NOT wired into the
  # meta-installer bundle.
  DispatchVersionsBump:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.repository == 'DisplayXR/displayxr-demo-earthview' }}
    needs: [BuildInstaller]
    runs-on: ubuntu-latest
    steps:
      - name: Mint dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DISPLAYXR_APP_ID }}
          private-key: ${{ secrets.DISPLAYXR_APP_PRIVATE_KEY }}
          owner: DisplayXR
          repositories: displayxr-runtime

      - name: Dispatch versions.json bump
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: DisplayXR/displayxr-runtime
          event-type: versions-bump
          client-payload: |
            {
              "field":       "earthview_demo",
              "tag":         "${{ github.ref_name }}",
              "source_repo": "${{ github.repository }}"
            }
