name: Build Linux

# EarthView Linux build-green dev loop (issue #19; M8 Linux epic
# runtime#699; recipe: the runtime repo's docs/guides/linux-demo-port.md).
#
# TRI-LTS MATRIX (mirrors displayxr-demo-modelviewer): the deployment target is
# Ubuntu 26.04 + Intel iGPU, but we also keep 22.04 (where render can be
# validated on hand today) and 24.04 green — so "build-green" means "builds on
# every supported toolchain (GCC 11 / 13 / 15)", not just whatever
# ubuntu-latest happens to be. 22.04/24.04 use hosted runners; 26.04 runs in a
# container (no hosted 26.04 runner yet).
#
# PROMOTED to a PR-triggered required check (#722): runs on every PR like the
# Windows/macOS/Android jobs, with the DetectChanges docs_only short-circuit so
# doc-only PRs report success in seconds without building. Still also runs on
# manual dispatch and `linux*` branches. Required contexts (main-protection
# ruleset): Build (Ubuntu 22.04 / 24.04 / 26.04).
#
# Build-green scope: compile earthview_handle_vk_linux. CI has
# no display/GPU, so the app is never run here; on-screen validation is a
# separate pass gated on the runtime's Linux Phase 1b + hardware.

on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - 'linux'
      - 'linux-**'
      - 'feature/linux-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Detected non-PR trigger — docs_only=false"
            exit 0
          fi
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected docs_only=$(grep ^docs_only= "$GITHUB_OUTPUT" | cut -d= -f2)"

  Build:
    name: Build (Ubuntu ${{ matrix.lts }})
    needs: DetectChanges
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 22.04's default GCC 11 cannot build cesium's vcpkg tree (ada-url
          # v3.3.0 needs C++20 constexpr std::string, a GCC 12 libstdc++
          # feature) — use the official 22.04 g++-12 package. Same instruction
          # applies to a 22.04 dev/render box.
          - lts: "22.04"
            runner: ubuntu-22.04
            extra_pkgs: g++-12
            cc: gcc-12
            cxx: g++-12
          - lts: "24.04"
            runner: ubuntu-24.04
          - lts: "26.04"
            runner: ubuntu-latest
            container: ubuntu:26.04
    env:
      # Pin cesium's ezvcpkg dependency tree to a fixed path so it is
      # deterministically cacheable (mirrors build-macos.yml). Absolute path
      # works on hosted runners and (root-created) in the 26.04 container.
      EZVCPKG_BASEDIR: /home/runner/.ezvcpkg
    steps:
      - name: Docs-only short-circuit
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "Doc-only change — reporting success without building."

      # In the 26.04 container we start as root with a bare image — install git
      # BEFORE checkout (which shells out to git). No-op on the hosted runners.
      - name: Bootstrap container (git for checkout)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          if [ "$(id -u)" = "0" ] && ! command -v git >/dev/null; then
            apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          fi

      - uses: actions/checkout@v5
        if: needs.DetectChanges.outputs.docs_only != 'true'

      # EarthView streams Google Photorealistic 3D Tiles via cesium-native,
      # consumed by add_subdirectory(third_party/cesium-native) and bootstrapping
      # its own deps (Draco, KTX, TLS/curl, …) through ezvcpkg on first configure
      # (~11 min cold). Mirrors build-macos.yml's clone step. build_linux.sh also
      # clones when absent, but do it here so the ezvcpkg cache key is stable.
      - name: Clone cesium-native (v0.61.0)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          git clone --branch v0.61.0 --depth 1 --recurse-submodules \
            https://github.com/CesiumGS/cesium-native.git third_party/cesium-native

      # Beyond the playbook's base list:
      #  * libxxf86vm-dev + libxcb-glx0-dev: once GL/EGL headers are present the
      #    OpenXR-SDK-Source loader build flips on GLX platform support — it
      #    includes <xcb/glx.h> and its gfxwrapper test helper links Xxf86vm
      #    (the GLX-flip gotcha, docs/guides/linux-demo-port.md).
      #  * X11 / Wayland / ALSA dev headers: the app windows via the runtime
      #    (hosted-NULL), but ezvcpkg ports + the OpenXR loader still want them.
      #  * curl / TLS + vcpkg toolchain build tools (autoconf/automake/libtool/
      #    nasm/zip/unzip/tar): cesium's ezvcpkg builds curl, openssl, draco, ktx
      #    and friends FROM SOURCE via vcpkg, which needs these to configure the
      #    ports. Missing them = a hard ezvcpkg bootstrap failure, not a silent
      #    compile-out. libcurl4-openssl-dev is a belt-and-suspenders system
      #    fallback for CesiumCurl.
      # SUDO shim so the same step works on hosted runners (non-root, has sudo)
      # and in the container (root, no sudo). Vendor-neutral libegl-dev/libgl-dev
      # so the names resolve across 22.04/24.04/26.04.
      - name: Install dependencies
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          SUDO=""; [ "$(id -u)" != "0" ] && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y ${{ matrix.extra_pkgs }} \
            build-essential cmake ninja-build pkg-config git ca-certificates \
            libvulkan-dev vulkan-validationlayers glslang-tools \
            libx11-dev libxext-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxcb1-dev libx11-xcb-dev libxcb-glx0-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev libegl-dev libgl-dev libasound2-dev \
            libcurl4-openssl-dev libssl-dev zlib1g-dev \
            autoconf automake autoconf-archive libtool nasm \
            zip unzip tar curl

      # Fail loudly if the key dev packages did not land — a hollow-green guard
      # analogous to mediaplayer's FFmpeg pkg-config assert.
      - name: Assert required dev libraries present
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          set -e
          pkg-config --exists vulkan   || { echo "::error::libvulkan-dev (vulkan.pc) missing"; exit 1; }
          pkg-config --exists libcurl  || { echo "::error::libcurl4-openssl-dev (libcurl.pc) missing"; exit 1; }
          command -v glslangValidator >/dev/null || { echo "::error::glslang-tools (glslangValidator) missing"; exit 1; }
          command -v nasm >/dev/null || { echo "::error::nasm missing (needed by ezvcpkg ports)"; exit 1; }
          echo "PASS: vulkan + libcurl + glslangValidator + nasm all present."

      # Restore cesium-native's ezvcpkg dependency tree from the pinned
      # EZVCPKG_BASEDIR. Keyed on the cesium tag + the pinned vcpkg commit + the
      # LTS release (GCC 11/13/15 artifacts are NOT interchangeable) — bump the
      # suffix if any changes. Cache miss/outage is non-fatal (actions/cache
      # only warns), so this can never break the build.
      - name: Cache cesium vcpkg dependencies (ezvcpkg)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: /home/runner/.ezvcpkg
          key: ezvcpkg-${{ runner.os }}-${{ matrix.lts }}-cesium-v0.61.0-vcpkg-afc0a2e0

      - name: Build (build-green; app is not run — no display on CI)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          # Disable the compiler-launcher cache (empty) — cesium auto-wires
          # sccache if found, and a GH-Actions-cache-backed sccache can hard-fail
          # the compile. build_linux.sh forwards this so cesium's auto-detect
          # guard skips it.
          CMAKE_CXX_COMPILER_LAUNCHER: ""
          MATRIX_CC: ${{ matrix.cc }}
          MATRIX_CXX: ${{ matrix.cxx }}
        run: |
          if [ -n "$MATRIX_CC" ]; then
            export CC="$MATRIX_CC" CXX="$MATRIX_CXX"
            echo "Using matrix compiler override: CC=$CC CXX=$CXX"
          fi
          ./scripts/build_linux.sh

      - name: Assert the Linux binary built
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          BIN=build/linux/earthview_handle_vk_linux
          [ -x "$BIN" ] || { echo "::error::$BIN not produced"; exit 1; }
          echo "PASS: $BIN built."
